[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Strict markers — typos in @pytest.mark.<name> become errors
addopts =
    -ra
    --strict-markers
    --tb=short

markers =
    unit: Pure-logic unit tests (no I/O, no mocks).
    integration: Tests that exercise multiple components with mocked I/O.
    slow: Tests that take >1s to run (DB seeding, large fixtures).
    future: Placeholder for a deferred enhancement listed in FUTURE_ENHANCEMENT_SCOPES.md. Always paired with @pytest.mark.skip(reason="future: ...").
